<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | SmartFinance</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #312e81);
    padding: 25px;
}

.auth-card {
    width: 420px;
    background: white;
    padding: 38px;
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
}

h1 { margin-bottom: 8px; }

.subtitle {
    color: #64748b;
    margin-bottom: 25px;
}

label {
    display: block;
    margin-top: 16px;
    margin-bottom: 7px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 13px;
    border: 1px solid #cbd5e1;
    border-radius: 9px;
    outline: none;
    font-size: 14px;
}

input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px #eef2ff;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 22px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 9px;
    font-weight: bold;
    cursor: pointer;
}

.error {
    background: #fef2f2;
    color: #b91c1c;
    padding: 13px;
    border-radius: 9px;
    margin-bottom: 18px;
}

.success {
    background: #f0fdf4;
    color: #15803d;
    padding: 13px;
    border-radius: 9px;
    margin-bottom: 18px;
}

.forgot {
    text-align: right;
    margin-top: 10px;
}

.register-text {
    text-align: center;
    margin-top: 20px;
}

a {
    color: #4f46e5;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="auth-card">

<h1>Welcome Back 👋</h1>

<p class="subtitle">
Login to your SmartFinance account.
</p>

{% if success %}
<div class="success">
✅ {{ success }}
</div>
{% endif %}

{% if error %}
<div class="error">
⚠️ {{ error }}
</div>
{% endif %}

<form method="POST">

<label>Username</label>

<input
    type="text"
    name="name"
    placeholder="Enter your username"
    required
>

<label>Password</label>

<input
    type="password"
    name="password"
    placeholder="Enter your password"
    required
>

<div class="forgot">
<a href="/forgot-password">
Forgot Password?
</a>
</div>

<button type="submit">
Login
</button>

</form>

<p class="register-text">
Don't have an account?
<a href="/register">Create Account</a>
</p>

</div>

</body>
</html>
