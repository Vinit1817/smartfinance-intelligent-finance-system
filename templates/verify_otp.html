<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Verify OTP | SmartFinance</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f7fb;
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: #172033;
        }

        .card {
            width: min(440px, 92%);
            background: white;
            padding: 35px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        }

        .icon {
            width: 70px;
            height: 70px;
            margin: auto;
            display: grid;
            place-items: center;
            border-radius: 22px;
            background: linear-gradient(135deg, #dbeafe, #ede9fe);
            font-size: 32px;
        }

        h1 {
            margin: 20px 0 8px;
        }

        p {
            color: #667085;
        }

        input {
            width: 100%;
            padding: 17px;
            margin-top: 20px;
            border: 1px solid #dbe3ef;
            border-radius: 12px;
            text-align: center;
            font-size: 25px;
            font-weight: 800;
            letter-spacing: 10px;
            outline: none;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px #eef2ff;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 22px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .resend {
            margin-top: 20px;
        }

        a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="icon">📩</div>

    <h1>Verify OTP</h1>

    <p>
        Enter the 6-digit OTP sent to your registered email.
        The code expires in 10 minutes.
    </p>

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="otp"
            maxlength="6"
            pattern="[0-9]{6}"
            inputmode="numeric"
            placeholder="000000"
            required
        >

        <button type="submit">
            Verify OTP
        </button>

    </form>

    <div class="resend">
        <a href="/forgot-password">
            Request New OTP
        </a>
    </div>

</div>

</body>
</html>
