<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | SmartFinance</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #312e81);
    padding: 25px;
}

.auth-card {
    width: 430px;
    background: white;
    padding: 38px;
    border-radius: 20px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
}

h1 { margin-bottom: 8px; }

.subtitle {
    color: #64748b;
    margin-bottom: 25px;
}

label {
    display: block;
    margin-top: 16px;
    margin-bottom: 7px;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 13px;
    border: 1px solid #cbd5e1;
    border-radius: 9px;
    outline: none;
    font-size: 14px;
}

input:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 0 3px #eef2ff;
}

button {
    width: 100%;
    padding: 14px;
    margin-top: 22px;
    background: #4f46e5;
    color: white;
    border: none;
    border-radius: 9px;
    font-weight: bold;
    cursor: pointer;
}

.error {
    background: #fef2f2;
    color: #b91c1c;
    padding: 13px;
    border-radius: 9px;
    margin-bottom: 18px;
}

.password-rules {
    background: #f8fafc;
    color: #64748b;
    padding: 13px;
    border-radius: 9px;
    margin-top: 10px;
    font-size: 13px;
    line-height: 1.7;
}

.login-text {
    text-align: center;
    margin-top: 20px;
}

a {
    color: #4f46e5;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="auth-card">

<h1>Create Account 🚀</h1>

<p class="subtitle">
Start managing your finances smarter.
</p>

{% if error %}
<div class="error">
⚠️ {{ error }}
</div>
{% endif %}

<form method="POST">

<label>Username</label>

<input
    type="text"
    name="name"
    placeholder="Choose your username"
    minlength="3"
    required
>

<label>Email Address</label>

<input
    type="email"
    name="email"
    placeholder="Enter your email address"
    required
>

<label>Password</label>

<input
    type="password"
    name="password"
    placeholder="Create a secure password"
    required
>

<div class="password-rules">
Password must contain:<br>
• Minimum 8 characters<br>
• One uppercase letter<br>
• One lowercase letter<br>
• One number
</div>

<button type="submit">
Create Account
</button>

</form>

<p class="login-text">
Already have an account?
<a href="/login">Login</a>
</p>

</div>

</body>
</html>
