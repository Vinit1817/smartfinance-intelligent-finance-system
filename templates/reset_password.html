<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password | SmartFinance</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f7fb;
            min-height: 100vh;
            display: grid;
            place-items: center;
            color: #172033;
        }

        .card {
            width: min(440px, 92%);
            background: white;
            padding: 35px;
            border-radius: 24px;
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        }

        .icon {
            width: 65px;
            height: 65px;
            display: grid;
            place-items: center;
            border-radius: 20px;
            background: linear-gradient(135deg, #dbeafe, #ede9fe);
            font-size: 30px;
        }

        h1 {
            margin: 20px 0 8px;
        }

        p {
            color: #667085;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin: 20px 0 8px;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #dbe3ef;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px #eef2ff;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .hint {
            font-size: 12px;
            color: #98a2b3;
            margin-top: 8px;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="icon">🔑</div>

    <h1>Create New Password</h1>

    <p>
        Create a new secure password for your SmartFinance account.
    </p>

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">

        <label>NEW PASSWORD</label>

        <input
            type="password"
            name="password"
            placeholder="Enter new password"
            required
        >

        <div class="hint">
            Minimum 8 characters with uppercase, lowercase and number.
        </div>

        <label>CONFIRM PASSWORD</label>

        <input
            type="password"
            name="confirm_password"
            placeholder="Confirm new password"
            required
        >

        <button type="submit">
            Reset Password
        </button>

    </form>

</div>

</body>
</html>
