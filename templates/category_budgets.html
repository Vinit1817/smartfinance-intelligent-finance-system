<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Category Budgets | SmartFinance</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>
        .budget-page {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }

        .budget-form {
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 5px 25px rgba(15,23,42,0.08);
        }

        .budget-form h1 {
            margin-bottom: 8px;
        }

        .budget-form p {
            color: #64748b;
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin: 15px 0 7px;
            font-weight: 600;
        }

        select,
        input {
            width: 100%;
            padding: 13px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            margin-top: 22px;
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }

        .existing {
            margin-top: 25px;
            background: white;
            padding: 25px;
            border-radius: 18px;
        }

        .budget-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #4f46e5;
            font-weight: 700;
        }
    </style>

</head>

<body>

<div class="budget-page">

    <div class="budget-form">

        <h1>🎯 Category Budgets</h1>

        <p>
            Set individual spending limits for each expense category.
        </p>

        <form method="POST">

            <label>Month</label>

            <input
                type="month"
                name="month"
                value="{{ selected_month }}"
                required
            >

            <label>Category</label>

            <select name="category" required>

                {% for category in categories %}

                <option value="{{ category['name'] }}">
                    {{ category["name"] }}
                </option>

                {% endfor %}

            </select>

            <label>Budget Amount</label>

            <input
                type="number"
                name="amount"
                min="0"
                step="0.01"
                placeholder="Example: 8000"
                required
            >

            <button class="save-btn" type="submit">
                Save Category Budget
            </button>

        </form>

    </div>


    <div class="existing">

        <h2>Current Category Budgets</h2>

        {% for budget in budgets %}

        <div class="budget-row">

            <strong>
                {{ budget["category"] }}
            </strong>

            <span>
                ₹{{ "%.2f"|format(budget["amount"]) }}
            </span>

        </div>

        {% else %}

        <p style="margin-top:20px;color:#64748b;">
            No category budgets set for this month.
        </p>

        {% endfor %}

    </div>


    <a href="/dashboard?month={{ selected_month }}"
       class="back-btn">

        ← Back to Dashboard

    </a>

</div>

</body>

</html>
