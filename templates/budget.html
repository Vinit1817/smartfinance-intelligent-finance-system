<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Set Monthly Budget | SmartFinance</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:#f4f7fb;color:#101828;min-height:100vh;display:grid;place-items:center;padding:25px}
.card{width:min(520px,100%);background:#fff;border:1px solid #e8edf5;border-radius:24px;padding:34px;box-shadow:0 18px 50px rgba(15,23,42,.08)}
.icon{width:62px;height:62px;border-radius:18px;background:linear-gradient(135deg,#dbeafe,#ede9fe);display:grid;place-items:center;font-size:29px}
.tag{display:block;color:#5b5ce2;font-size:11px;font-weight:900;letter-spacing:1.5px;margin-top:22px}h1{font-size:31px;margin:7px 0 8px}p{color:#667085;margin:0 0 25px}
label{display:block;font-size:12px;font-weight:800;letter-spacing:.7px;margin:18px 0 8px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
input,select{width:100%;padding:14px;border:1px solid #d7deea;border-radius:12px;font-size:15px;background:#fff;outline:none}
input:focus,select:focus{border-color:#6366f1;box-shadow:0 0 0 4px #eef2ff}
.money{position:relative}.money span{position:absolute;left:15px;top:14px;font-weight:800}.money input{padding-left:38px}
button{width:100%;margin-top:23px;padding:15px;border:0;border-radius:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:15px;font-weight:800;cursor:pointer}
.back{display:block;text-align:center;margin-top:18px;color:#475467;text-decoration:none;font-weight:700;font-size:14px}
@media(max-width:520px){.row{grid-template-columns:1fr}.card{padding:25px}}
</style>
</head>
<body>
<div class="card">
<div class="icon">🎯</div>
<span class="tag">FINANCIAL CONTROL</span>
<h1>Set Monthly Budget</h1>
<p>Define your spending limit for a selected financial period.</p>
<form method="POST" id="financeForm">
<div class="row">
<div><label>MONTH</label><select id="month_number" required>
<option value="01">January</option><option value="02">February</option><option value="03">March</option><option value="04">April</option>
<option value="05">May</option><option value="06">June</option><option value="07">July</option><option value="08">August</option>
<option value="09">September</option><option value="10">October</option><option value="11">November</option><option value="12">December</option>
</select></div>
<div><label>YEAR</label><input type="number" id="year" min="1" max="9999" placeholder="Enter year" required></div>
</div>
<input type="hidden" name="month" id="combined_month">
<label>MONTHLY BUDGET</label>
<div class="money"><span>₹</span><input type="number" name="amount" min="1" step="0.01" placeholder="30000" required></div>
<button type="submit">Save Monthly Budget</button>
</form>
<a class="back" href="/dashboard">← Back to Dashboard</a>
</div>
<script>
const now=new Date();
document.getElementById("month_number").value=String(now.getMonth()+1).padStart(2,"0");
document.getElementById("year").value=now.getFullYear();
document.getElementById("financeForm").addEventListener("submit",function(){
 const month=document.getElementById("month_number").value;
 const year=document.getElementById("year").value.padStart(4,"0");
 document.getElementById("combined_month").value=year+"-"+month;
});
</script>
</body>
</html>
